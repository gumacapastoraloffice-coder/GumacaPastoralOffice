<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Diocese of Gumaca</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="login-header">
                <div class="logo-wrapper">
                    <img src="{{ url_for('static', filename='Diocese Logo.jpg') }}" alt="Diocese of Gumaca Logo" class="login-logo">
                </div>
                <h1>Diocese of Gumaca</h1>
                <p class="login-subtitle">Pastoral Office</p>
            </div>

            <!-- Error Message -->
            {% if error %}
                <div class="error-alert">
                    <span class="error-icon">⚠️</span>
                    <div>{{ error }}</div>
                </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <span class="label-text">Username</span>
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Enter your username"
                            required 
                            autocomplete="username"
                            autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <span class="label-text">Password</span>
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required 
                            autocomplete="current-password">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-login-submit">Sign In</button>
                    <button type="button" class="btn-cancel" onclick="window.location.href='/'">Cancel</button>
                </div>
            </form>

            <!-- Back Link -->
            <div class="login-footer">
                <a href="/" class="back-link">← Return to Community Page</a>
            </div>
        </div>
    </div>
</body>
</html>
